<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Exporter · Privacy Policy</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #1b1b1b;
      --muted: #5f6368;
      --accent: #2e7d32;
      --border: #e0e0e0;
      --chip: #f1f3f4;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --fg: #e8e8e8;
        --muted: #a8a8a8;
        --accent: #81c784;
        --border: #2a2a2a;
        --chip: #1f1f1f;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }
    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }
    label.lang {
      font-size: 0.85rem;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    select {
      background: var(--chip);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.9rem;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 4px;
    }
    .updated {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    h2 {
      font-size: 1.2rem;
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--accent);
    }
    ul { padding-left: 20px; }
    a { color: var(--accent); }
    footer {
      margin-top: 48px;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <label class="lang">
        <span id="langLabel">Idioma</span>
        <select id="langSelect" aria-label="Language">
          <option value="es">Español</option>
          <option value="en">English</option>
          <option value="zh">中文</option>
          <option value="ja">日本語</option>
          <option value="de">Deutsch</option>
          <option value="it">Italiano</option>
          <option value="fr">Français</option>
        </select>
      </label>
    </div>

    <h1 id="title"></h1>
    <p class="updated" id="updated"></p>

    <div id="sections"></div>

    <footer id="footer"></footer>
  </main>

    const SUPPORTED = ["es", "en", "zh", "ja", "de", "it", "fr"];

    function pickLanguage() {
      const saved = localStorage.getItem("he_lang");
      if (saved && SUPPORTED.includes(saved)) return saved;
      const langs = navigator.languages || [navigator.language || "es"];
      for (const l of langs) {
        const base = l.toLowerCase().split("-")[0];
        if (SUPPORTED.includes(base)) return base;
      }
      return "es";
    }

    function render(lang) {
      const t = I18N[lang] || I18N.es;
      document.documentElement.lang = t.htmlLang;
      document.getElementById("langLabel").textContent = t.langLabel;
      document.getElementById("title").textContent = t.title;
      document.getElementById("updated").textContent = t.updated;
      document.getElementById("footer").textContent = t.footer;

      const container = document.getElementById("sections");
      container.innerHTML = "";
      for (const [heading, body] of t.sections) {
        const h2 = document.createElement("h2");
        h2.textContent = heading;
        container.appendChild(h2);
        if (Array.isArray(body)) {
          const ul = document.createElement("ul");
          for (const item of body) {
            const li = document.createElement("li");
            li.textContent = item;
            ul.appendChild(li);
          }
          container.appendChild(ul);
        } else {
          const p = document.createElement("p");
          p.textContent = body;
          container.appendChild(p);
        }
      }
      document.getElementById("langSelect").value = lang;
    }

    const initial = pickLanguage();
    render(initial);
    document.getElementById("langSelect").addEventListener("change", (e) => {
      const lang = e.target.value;
      localStorage.setItem("he_lang", lang);
      render(lang);
    });
